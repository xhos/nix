name: Deploy mizore

on:
  repository_dispatch:
    types: [deploy-mizore]
  workflow_dispatch:

concurrency:
  group: deploy-mizore
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v5

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.xhos.dev/main
            extra-trusted-public-keys = main:sD+aH0XOgkp432O05lkkl1x7XipgELXk+1mQmuDch0U=
            accept-flake-config = true
            http-connections = 128
            download-buffer-size = 536870912
            max-substitution-jobs = 32

      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Update null flake input
        run: |
          nix flake update null
          if git diff --quiet flake.lock; then
            echo "LOCK_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "LOCK_CHANGED=true" >> "$GITHUB_ENV"
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add flake.lock
            git commit -m "update null"
            git push
          fi

      - uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: "--login-server https://hs.xhos.dev --accept-dns"
          version: "1.76.6"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_mizore
          echo "${{ secrets.NIX_SECRETS_SSH_KEY }}" > ~/.ssh/nix_secrets
          chmod 600 ~/.ssh/deploy_mizore ~/.ssh/nix_secrets
          MIZORE_IP=$(tailscale status --json | jq -r '.Peer[] | select(.HostName == "mizore") | .TailscaleIPs[0]')
          if [ -z "$MIZORE_IP" ] || [ "$MIZORE_IP" = "null" ]; then
            echo "Could not find mizore in tailnet. Peers:"
            tailscale status --json | jq -r '.Peer[] | "\(.HostName) \(.TailscaleIPs[0])"'
            exit 1
          fi
          echo "mizore IP: $MIZORE_IP"
          cat >> ~/.ssh/config <<EOF
          Host mizore.ts.xhos.dev
            HostName $MIZORE_IP
            User deploy
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/deploy_mizore
          Host github.com
            IdentityFile ~/.ssh/nix_secrets
          EOF
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build system closure
        run: nix build .#nixosConfigurations.mizore.config.system.build.toplevel

      - name: Push to cache
        run: |
          nix run github:zhaofengli/attic#attic -- \
            login ci https://cache.xhos.dev "${{ secrets.ATTIC_TOKEN }}"
          nix run github:zhaofengli/attic#attic -- push main ./result

      - name: Clear stale switch-to-configuration unit
        run: |
          ssh deploy@mizore.ts.xhos.dev "
            sudo systemctl stop nixos-rebuild-switch-to-configuration.service 2>/dev/null || true
            sudo systemctl reset-failed nixos-rebuild-switch-to-configuration.service 2>/dev/null || true
          "

      - name: Deploy
        run: |
          nix run nixpkgs#nixos-rebuild -- switch \
            --flake .#mizore \
            --target-host deploy@mizore.ts.xhos.dev \
            --sudo \
            --fallback
