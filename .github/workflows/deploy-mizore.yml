name: Deploy mizore

on:
  repository_dispatch:
    types: [deploy-mizore]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            extra-substituters = https://cache.xhos.dev/main
            extra-trusted-public-keys = main:sD+aH0XOgkp432O05lkkl1x7XipgELXk+1mQmuDch0U=
            accept-flake-config = true
            http-connections = 128
            download-buffer-size = 536870912
            max-substitution-jobs = 32

      - name: Update null flake input
        run: |
          nix flake lock --update-input null
          if git diff --quiet flake.lock; then
            echo "LOCK_CHANGED=false" >> "$GITHUB_ENV"
          else
            echo "LOCK_CHANGED=true" >> "$GITHUB_ENV"
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add flake.lock
            git commit -m "update null"
            git push
          fi

      - uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: "--login-server https://hs.xhos.dev"
          version: "1.76.6"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_mizore
          echo "${{ secrets.NIX_SECRETS_SSH_KEY }}" > ~/.ssh/nix_secrets
          chmod 600 ~/.ssh/deploy_mizore ~/.ssh/nix_secrets
          cat >> ~/.ssh/config <<'EOF'
          Host mizore.ts.xhos.dev
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            IdentityFile ~/.ssh/deploy_mizore
          Host github.com
            IdentityFile ~/.ssh/nix_secrets
          EOF
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Build system closure
        run: nix build .#nixosConfigurations.mizore.config.system.build.toplevel

      - name: Push to cache
        run: |
          nix run github:zhaofengli/attic#attic -- \
            login ci https://cache.xhos.dev "${{ secrets.ATTIC_TOKEN }}"
          nix run github:zhaofengli/attic#attic -- push main ./result

      - name: Deploy
        run: |
          nix run nixpkgs#nixos-rebuild -- switch \
            --flake .#mizore \
            --target-host deploy@mizore.ts.xhos.dev \
            --use-remote-sudo
